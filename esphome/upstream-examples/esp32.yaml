# BLE Keyboard project
# https://github.com/adesanto84/esphome-blekeyboard

############# User configuration #############

substitutions:

  board: esp32doit-devkit-v1
  mdns_name: blekeyboard

  # Wifi credentials
  wifi_ssid: "mywifissid"
  wifi_password: "miwifipassword"

  # OTA and API
  ota_password: "esphome"
  api_key: "0Xj+DK819d/Azqyt6y1Wi7WVJeSuXEkxiBajFfokieQ="  # CHANGE ME: generate your own API encryption key (or use !secret)

  # Software configuration
  input_text_entity_id: "input_text.blekeyboard_new_message" # A string object for entering arbitrary text.


########### End user configuration ###########


############# Base configuration #############

esphome:
  name: $mdns_name
  comment: "https://github.com/adesanto84/esphome-blekeyboard"

esp32:
  board: $board
  variant: esp32
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_BLE_ENABLED: "y"
      CONFIG_BT_NIMBLE_ENABLED: "y"
      # Enable NimBLE's built-in HID service. Required for esp_hid device
      # backend on NimBLE.
      CONFIG_BT_NIMBLE_HID_SERVICE: "y"
      # esp_hid component
      CONFIG_BT_HID_DEVICE_ENABLED: "y"
      # Persist NimBLE bonds in NVS so they survive reboot.
      # Without this, Windows reconnect fails with reason=531 after
      # device reboot or firmware update.
      CONFIG_BT_NIMBLE_NVS_PERSIST: "y"
      # Enable Secure Connections compile-time support. Runtime sm_sc=0
      # still selects Legacy pairing (for Windows Just Works), but SC
      # must be compiled in for the SM stack to function correctly.
      CONFIG_BT_NIMBLE_SM_SC: "y"

# Enable logging
logger:

# Enable OTA
ota:
  - platform: esphome
    password: $ota_password

# Enable WiFi
wifi:
  ssid: $wifi_ssid
  password: $wifi_password
  fast_connect: on

# Enable Home Assistant API
api:
  encryption:
    key: $api_key

########### End base configuration ###########

# Enable components
external_components:
  - source:
      type: local
      path: ../components
#  - source: github://adesanto84/esphome-blekeyboard

ble_keyboard:
  id: my_ble_keyboard
  name: "MyBleKeyboard"
  manufacturer_id: "Apple"
  reconnect: true
  battery_level: 50
  buttons: true

text_sensor:
  - platform: homeassistant
    id: input_text
    entity_id: $input_text_entity_id
    internal: true

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

button:
  - platform: restart
    entity_category: "config"
    name: "Restart"

  - platform: template
    name: "Release"
    id: key_release
    icon: "mdi:send"
    on_press:
      then:
        - ble_keyboard.print:
            id: my_ble_keyboard
            text: !lambda "return id(input_text).state;"
        - ble_keyboard.release: my_ble_keyboard

  - platform: template
    name: "Ctrl + A"
    id: key_ctrl_a
    icon: "mdi:vector-combine"
    on_press:
      then:
        - ble_keyboard.combination:
            id: my_ble_keyboard
            delay: 8
            keys:
              - 0x80
              - "a"

  - platform: template
    name: "Calc"
    id: key_calc
    icon: "mdi:calculator"
    on_press:
      then:
        - ble_keyboard.press:
            id: my_ble_keyboard
            code:
              - 0
              - 2

  - platform: template
    name: "Start advertising"
    id: start_advertising
    icon: "mdi:play"
    on_press:
      then:
        - ble_keyboard.start: my_ble_keyboard

  - platform: template
    name: "Stop advertising"
    id: stop_advertising
    icon: "mdi:stop"
    on_press:
      then:
        - ble_keyboard.stop: my_ble_keyboard